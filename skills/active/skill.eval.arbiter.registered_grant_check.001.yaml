id: skill.eval.arbiter.registered_grant_check.001
name: arbiter_registered_grant_check
agent: evaluator
domain:
  language: verilog
  topic:
  - arbiter
  - sequential
  - fairness
  - registered_output
task_patterns:
- sequential_arbiter
- sequential
- arbiter
- fairness
- priority
- reset
preconditions:
- generated from evaluator-observed failure
anti_patterns:
- combinational grant sampled after clock edge
payload:
  type: test_strategy
  content: For round-robin arbiters, act as an adversarial verifier. Hold both requests
    high across multiple clock cycles and sample grant after the clock edge. Also
    check onehot0, never grant an inactive requester, idle cycles must grant zero,
    reset re-entry must restart priority, and both-request traffic must cover grants
    to requester 0 and requester 1. This catches designs that expose next-cycle priority
    through a combinational grant or pass only the shortest directed sequence.
metrics:
  uses: 0
  successes: 0
  failures: 0
  utility_ema: 0.7
  token_cost_ema: 0.0
cache:
  pin: false
version:
  status: active
  revision: 2
  parent_ids: []
validation:
  evidence:
  - task_id: local_round_robin_arbiter2
    policy: tag_topk
    attempts: 3
    failure_signature: "t match MODULE name: 'top_module'\n    1 | module top_module\
      \ (\n      |        ^~~~~~~~~~\n                       ... For warning description\
      \ see https://verilator.org/warn/DECLFILENAME?v=5.048\n                    \
      \   ... Use \"/* verilator lint_off DECLFILENAME */\" and lint_on around source\
      \ to disable this message.\n\n\n$ iverilog -g2012 -o sim.out tb.sv design.v\n\
      returncode=0\nstdout:\n\nstderr:\n\n\n$ vvp sim.out\nreturncode=1\nstdout:\n\
      FATAL: tb.sv:9: grant mismatch\n       Time: 7100  Scope: tb.step\n\nstderr:\n"
  - task_id: local_round_robin_arbiter2
    decision: manual_promote_for_ablation
    reason: candidate directly targets observed grant mismatch failure signature
