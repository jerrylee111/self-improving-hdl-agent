id: local_round_robin_arbiter2
source: local_seed
license: project-owned
language: verilog
family: sequential_arbiter
tags: [sequential, arbiter, fairness, priority, reset]
difficulty: 4
prompt: |
  Implement a two-requester round-robin arbiter named top_module.
  Inputs are clk, reset, req[1:0]. Output is grant[1:0].
  The reset is synchronous and active high.
  If no request is active, grant should be 2'b00.
  If exactly one request is active, grant that requester.
  If both requests are active, alternate the grant between requester 0 and requester 1 on successive granted cycles.
  After reset, requester 0 has priority when both request simultaneously.
top_module: top_module
ports:
  - {name: clk, dir: input, width: 1}
  - {name: reset, dir: input, width: 1}
  - {name: req, dir: input, width: 2}
  - {name: grant, dir: output, width: 2}
clock: clk
reset: reset
expected: {type: reference_model}
evaluation: {lint: true, simulation: true, formal: false}
split: {default: dev}
