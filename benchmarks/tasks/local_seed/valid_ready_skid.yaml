id: local_valid_ready_skid
source: local_seed
license: project-owned
language: systemverilog
family: handshake_basic
tags: [sequential, valid_ready, handshake, backpressure]
difficulty: 5
prompt: |
  Implement a one-entry skid buffer named top_module.
  Inputs are clk, reset, in_valid, in_data[7:0], out_ready.
  Outputs are in_ready, out_valid, out_data[7:0].
  The reset is synchronous and active high.
  The buffer should accept input when in_valid and in_ready are high.
  It should present valid output until the downstream accepts it with out_ready.
  Data must remain stable while out_valid is high and out_ready is low.
top_module: top_module
ports:
  - {name: clk, dir: input, width: 1}
  - {name: reset, dir: input, width: 1}
  - {name: in_valid, dir: input, width: 1}
  - {name: in_data, dir: input, width: 8}
  - {name: in_ready, dir: output, width: 1}
  - {name: out_valid, dir: output, width: 1}
  - {name: out_data, dir: output, width: 8}
  - {name: out_ready, dir: input, width: 1}
clock: clk
reset: reset
expected: {type: reference_model}
evaluation: {lint: true, simulation: true, formal: false}
split: {default: dev}
