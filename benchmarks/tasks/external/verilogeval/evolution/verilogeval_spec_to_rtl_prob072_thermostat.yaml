prompt: "I would like you to implement a module named TopModule with the following\n\
  interface. All input and output ports are one bit unless otherwise\nspecified.\n\
  \n - input  mode\n - input  too_cold\n - input  too_hot\n - input  fan_on\n - output\
  \ heater\n - output aircon\n - output fan\n\nThe module should implement a heating/cooling\
  \ thermostat controller which\ncontrols both a heater (during winter) and an air\
  \ conditioner (during\nsummer). The module should on and off the heater, air conditioning,\
  \ and\nblower fan as appropriate. The thermostat can be in one of two modes:\nheating\
  \ (mode = 1) and cooling (mode = 0). In heating mode, turn the\nheater on when it\
  \ is too cold (too_cold = 1) but do not use the air\nconditioner. In cooling mode,\
  \ turn the air conditioner on when it is too\nhot (too_hot = 1), but do not turn\
  \ on the heater. When the heater or air\nconditioner are on, also turn on the fan\
  \ to circulate the air. In\naddition, the user can also request the fan to turn\
  \ on (fan_on = 1), even\nif the heater and air conditioner are off."
