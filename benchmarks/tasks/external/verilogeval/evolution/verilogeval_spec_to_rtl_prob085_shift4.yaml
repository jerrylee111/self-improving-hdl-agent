prompt: "I would like you to implement a module named TopModule with the following\n\
  interface. All input and output ports are one bit unless otherwise\nspecified.\n\
  \n - input  clk\n - input  areset\n - input  load\n - input  ena\n - input  data\
  \ (4 bits)\n - output q (4 bits)\n\nThe module should implement a 4-bit shift register\
  \ (right shift), with\nasynchronous positive edge triggered areset, synchronous\
  \ active high\nsignals load, and enable.\n\n  (1) areset: Resets shift register\
  \ to zero.\n\n  (2) load: Loads shift register with data[3:0] instead of shifting.\n\
  \n  (3) ena: Shift right (q[3] becomes zero, q[0] is shifted out and\n       disappears).\n\
  \n  (4) q: The contents of the shift register. If both the load and ena\n      \
  \ inputs are asserted (1), the load input has higher priority.\n\nAssume all sequential\
  \ logic is triggered on the positive edge of the\nclock."
