  \n - input  clk\n - input  areset\n - input  train_valid\n - input  train_taken\n\
  \ - output state (2 bits)\n\nThe module should implement a two-bit saturating counter.\
  \ The counter\nincrements (up to a maximum of 3) when train_valid = 1 and\ntrain_taken\
  \ = 1. It decrements (down to a minimum of 0) when\ntrain_valid = 1 and train_taken\
  \ = 0. When not training (train_valid = 0),\nthe counter keeps its value unchanged.\
  \ areset is a positive edge\ntriggered asynchronous reset that resets the counter\
  \ to weakly not-taken\n(2'b01). Output state[1:0] is the two-bit counter value.\
  \ Assume all\nsequential logic is triggered on the positive edge of the clock."
