prompt: "I would like you to implement a module named TopModule with the following\n\
  interface. All input and output ports are one bit unless otherwise\nspecified.\n\
  \n - input  clk\n - input  load\n - input  ena  (  2 bits)\n - input  data (100\
  \ bits)\n - output q    (100 bits)\n\nThe module should implement a 100-bit left/right\
  \ rotator, with\nsynchronous load and left/right enable. A rotator shifts-in the\n\
  shifted-out bit from the other end of the register, unlike a shifter that\ndiscards\
  \ the shifted-out bit and shifts in a zero. If enabled, a rotator\nrotates the bits\
  \ around and does not modify/discard them.\n\n  (1) load: Loads shift register with\
  \ data[99:0] instead of rotating.\n      Synchronous active high.\n\n  (2) ena[1:0]:\
  \ Synchronous. Chooses whether and which direction to\n      rotate:\n      (a)\
  \ 2'b01 rotates right by one bit,\n      (b) 2'b10 rotates left by one bit,\n  \
  \    (c) 2'b00 and 2'b11 do not rotate.\n\n  (3) q: The contents of the rotator."
