difficulty: 3
prompt: "I would like you to implement a module named TopModule with the following\n\
  interface. All input and output ports are one bit unless otherwise\nspecified.\n\
  \n - input  clk,\n - input  load,\n - input  data (10 bits)\n - output tc\n\nThe\
  \ module should implement a timer that counts down for a given number\nof clock\
  \ cycles, then asserts a signal to indicate that the given\nduration has elapsed.\
  \ A good way to implement this is with a down-counter\nthat asserts an output signal\
  \ when the count becomes 0. At each clock\ncycle:\n\n  (1) If load = 1, load the\
  \ internal counter with the 10-bit data, the\n  number of clock cycles the timer\
  \ should count before timing out. The\n  counter can be loaded at any time, including\
  \ when it is still counting\n  and has not yet reached 0.\n\n  (2) If load = 0,\
  \ the internal counter should decrement by 1. The output\n  signal tc (\"terminal\
  \ count\") indicates whether the internal counter has\n  reached 0. Once the internal\
  \ counter has reached 0, it should stay 0\n  (stop counting) until the counter is\
  \ loaded again.\n\nThe module should implement a single D flip-flop. Assume all\
  \ sequential\nlogic is triggered on the positive edge of the clock."
top_module: TopModule
ports: []
