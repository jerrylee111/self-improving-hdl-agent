  \ out\n\nThe module should implement the following is the state transition table\n\
  for a Moore state machine with one input, one output, and four states.\nUse the\
  \ following state encoding: A=2'b00, B=2'b01, C=2'b10,\nD=2'b11.Implement only the\
  \ state transition logic and output logic (the\ncombinational logic portion) for\
  \ this state machine. Given the current\nstate (state), compute the next_state and\
  \ output (out) based on the state\ntransition table.\n\n  State | Next state in=0,\
  \ Next state in=1 | Output\n  A     | A, B                             | 0\n  B\
  \     | C, B                             | 0\n  C     | A, D                   \
  \          | 0\n  D     | C, B                             | 1"
